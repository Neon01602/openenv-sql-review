name: sql-query-review
version: "2.0.0"
spec: openenv-v1
description: >
  An OpenEnv-compliant RL environment that trains and evaluates AI agents
  on SQL code review — a genuine, high-stakes task performed daily by data
  engineers and DBAs. Agents review PostgreSQL queries for correctness bugs,
  performance anti-patterns, and security vulnerabilities across 6 hand-crafted
  tasks (easy → hard) plus procedurally generated tasks for unlimited diversity.

tags:
  - sql
  - code-review
  - reinforcement-learning
  - data-engineering
  - security
  - openenv

domain: code-review
difficulty_range: [easy, medium, hard]

tasks:
  - id: easy_correctness
    difficulty: easy
    max_steps: 5
    description: "Wrong JOIN type on nullable FK silently drops guest checkout orders."
    correct_decision: request_changes
    n_ground_truth_issues: 1

  - id: easy_type_coercion
    difficulty: easy
    max_steps: 5
    description: "Implicit integer-to-VARCHAR coercion defeats an index on a 5M-row table."
    correct_decision: request_changes
    n_ground_truth_issues: 2

  - id: medium_performance
    difficulty: medium
    max_steps: 7
    description: "Dashboard query with N+1 correlated subquery, non-sargable LOWER(), and SELECT *."
    correct_decision: request_changes
    n_ground_truth_issues: 3

  - id: medium_aggregation
    difficulty: medium
    max_steps: 7
    description: "Weekly revenue report with no-op HAVING clause, wrong AVG metric, and missing index."
    correct_decision: request_changes
    n_ground_truth_issues: 4

  - id: hard_security
    difficulty: hard
    max_steps: 10
    description: "Stored function with SQL injection, credential leak, logic bug, and sort-order DoS."
    correct_decision: reject
    n_ground_truth_issues: 4

  - id: hard_migration
    difficulty: hard
    max_steps: 10
    description: "Schema migration with data-loss risk, irreversible DROP, table-locking SET NOT NULL."
    correct_decision: reject
    n_ground_truth_issues: 4

procedural_tasks:
  description: >
    Novel tasks can be generated by passing task_id=generated_<difficulty>_<seed>
    to /reset. Seeds produce deterministic, reproducible tasks.
  difficulties: [easy, medium, hard]
  example_ids:
    - generated_easy_7
    - generated_medium_42
    - generated_hard_99

observation_space:
  session_id:        {type: string, description: "Unique episode identifier"}
  task_id:           {type: string, description: "Active task"}
  step_number:       {type: int,    description: "Current step (0-indexed)"}
  max_steps:         {type: int,    description: "Maximum steps before forced termination"}
  query:             {type: string, description: "SQL query under review"}
  query_dialect:     {type: string, description: "SQL dialect (PostgreSQL)"}
  schema_context:    {type: array,  description: "Tables, columns, row counts, indexes, constraints"}
  review_thread:     {type: array,  description: "Prior agent comments/issues/decisions"}
  task_instructions: {type: string, description: "What the agent should focus on"}
  done:              {type: bool,   description: "Whether the episode has ended"}

action_space:
  session_id: {type: string,   required: true}
  issues:
    type: array
    items:
      category:     {type: enum, values: [correctness, performance, security, style]}
      severity:     {type: enum, values: [critical, high, medium, low]}
      line_hint:    {type: int,  required: false}
      description:  {type: string}
      suggested_fix: {type: string, required: false}
  comment:   {type: string, required: false}
  decision:  {type: enum, values: [approve, request_changes, reject], required: false,
              note: "Submitting this field ends the episode"}

reward_space:
  value:                   {type: float, range: [-1.0, 1.0], description: "Step reward"}
  cumulative:              {type: float, description: "Cumulative reward"}
  issue_detection_reward:  {type: float, range: [0.0, 0.5],  description: "Weighted reward for matched GT issues"}
  false_positive_penalty:  {type: float, range: [0.0, 1.0],  description: "Penalty for fabricated issues"}
  severity_accuracy_reward:{type: float, range: [0.0, 0.1],  description: "Bonus for correct severity rating"}
  decision_reward:         {type: float, range: [0.0, 0.2],  description: "Reward for correct final decision"}
  step_efficiency_bonus:   {type: float, range: [0.0, 0.1],  description: "Bonus for finishing early"}

grader:
  description: "Final 0.0–1.0 score computed from detection rate, FP penalty, and decision accuracy"
  formula: "detection_score * fp_multiplier * 0.80 + decision_score * 0.20"
  components:
    detection_score:   "Σ(weight of detected GT issues) / Σ(weight of all GT issues)"
    fp_multiplier:     "max(0.4, 1 - fp_rate * 1.5) — harsh penalty for hallucinated issues"
    decision_score:    "1.0 exact | 0.3 partial | 0.0 wrong"

endpoints:
  reset:    {method: POST, path: /reset,    description: "Start new episode"}
  step:     {method: POST, path: /step,     description: "Apply action"}
  state:    {method: GET,  path: /state,    description: "Current episode state"}
  grader:   {method: GET,  path: /grader,   description: "Final grader score"}
  tasks:    {method: GET,  path: /tasks,    description: "Task list + action schema"}
  baseline: {method: POST, path: /baseline, description: "Heuristic baseline (no API key)"}
  health:   {method: GET,  path: /health,   description: "Liveness probe"}

baseline:
  agent: heuristic_regex_v2
  requires_api_key: false
  scores:
    easy_correctness:  ~0.80
    easy_type_coercion: ~0.72
    medium_performance: ~0.55
    medium_aggregation: ~0.48
    hard_security:     ~0.65
    hard_migration:    ~0.58
    average:           ~0.63

docker:
  port: 7860
  build: "docker build -t sql-review-env ."
  run:   "docker run -p 7860:7860 sql-review-env"

huggingface:
  space: Neo0110/openenv-sql-review
  sdk: docker
  tags: [openenv, reinforcement-learning, sql, code-review]